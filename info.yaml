# Tiny Tapeout project information
project:
  title:        "RISC-V Single Cycle 7 Instr"      # Project title
  author:       "Mahmoud Magdy"      # Your name
  discord:      "mahmoudmq"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A simple RISC-V single cycle processor implementing 7 instructions"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "alu.sv"
    - "control_unit.sv"
    - "data_mem.sv"
    - "extend.sv"
    - "instruction_mem.sv"
    - "PCPlus4.sv"
    - "PCTarget.sv"
    - "register_file.sv"
    - "top.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "clk"
  ui[1]: "rst_n"
  ui[2]: "NA"
  ui[3]: "NA"
  ui[4]: "NA"
  ui[5]: "NA"
  ui[6]: "NA"
  ui[7]: "NA"

  # Outputs
  uo[0]: "result[0]"
  uo[1]: "result[1]"
  uo[2]: "result[2]"
  uo[3]: "result[3]"
  uo[4]: "result[4]"
  uo[5]: "result[5]"
  uo[6]: "result[6]"
  uo[7]: "result[7]"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
